services:
  grok2api:
    image: ${IMAGE_REPO:-ghcr.io/aurora-develop/grok2api}:${IMAGE_TAG:-latest}
    pull_policy: ${IMAGE_PULL_POLICY:-always}
    restart: unless-stopped
    init: true
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:${SERVER_PORT:-8000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
